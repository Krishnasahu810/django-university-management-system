{% extends "base.html" %}

{% block title %}Add/Edit Marks - Admin Panel{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1>📊 Record Marks</h1>
            <hr>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_student" class="form-label">Student</label>
                    <select name="student" id="id_student" class="form-control" required>
                        <option value="">Select a student</option>
                        {% for student in students %}
                            <option value="{{ student.id }}">{{ student.first_name }} {{ student.last_name }} ({{ student.username }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="id_course" class="form-label">Course</label>
                    <select name="course" id="id_course" class="form-control" required>
                        <option value="">Select a course</option>
                        {% for course in courses %}
                            <option value="{{ course.id }}">{{ course.code }} - {{ course.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="id_assignment" class="form-label">Assignment Marks (out of 10)</label>
                    <input type="number" name="assignment" id="id_assignment" class="form-control" min="0" max="10" value="0" required>
                </div>

                <div class="mb-3">
                    <label for="id_midterm" class="form-label">Midterm Marks (out of 30)</label>
                    <input type="number" name="midterm" id="id_midterm" class="form-control" min="0" max="30" value="0" required>
                </div>

                <div class="mb-3">
                    <label for="id_final" class="form-label">Final Marks (out of 60)</label>
                    <input type="number" name="final" id="id_final" class="form-control" min="0" max="60" value="0" required>
                </div>

                <div class="alert alert-info">
                    <strong>Note:</strong> Total = Assignment (10) + Midterm (30) + Final (60) = 100
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Save Marks</button>
                    <a href="{% url 'admin_marks' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
