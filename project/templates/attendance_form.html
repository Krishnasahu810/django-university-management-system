<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Attendance | UMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #f5f1e8 0%, #ebe5d9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border-top: 4px solid #2d5016;
        }

        h1 {
            color: #2d5016;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form p {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        form label {
            color: #2d5016;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        form input,
        form select,
        form textarea {
            padding: 12px;
            border: 1px solid #d4cec0;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            background: #faf8f3;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            outline: none;
            border-color: #2d5016;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(45, 80, 22, 0.1);
        }

        button[type="submit"] {
            background: #2d5016;
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            box-shadow: 0 4px 8px rgba(45, 80, 22, 0.2);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
            z-index: -1;
        }

        button[type="submit"]:hover {
            background: #1e3810;
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(45, 80, 22, 0.4);
        }

        button[type="submit"]:hover::before {
            left: 100%;
        }

        button[type="submit"]:active {
            transform: translateY(-1px);
            box-shadow: 0 2px 4px rgba(45, 80, 22, 0.3);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #2d5016;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            border-bottom: 1px solid #d4cec0;
            padding-bottom: 2px;
        }

        .back-link a:hover {
            color: #1e3810;
            border-bottom-color: #2d5016;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 25px;
            }

            button[type="submit"] {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Attendance</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create</button>
        </form>
        <p class="back-link"><a href="{% url 'attendance' %}">Back to attendance</a></p>
    </div>
</body>
</html>
