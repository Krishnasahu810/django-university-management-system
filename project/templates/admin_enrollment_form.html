{% extends "base.html" %}

{% block title %}Create Enrollment - Admin Panel{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1>✅ Create Enrollment</h1>
            <hr>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_student" class="form-label">Student</label>
                    <select name="student" id="id_student" class="form-control" required>
                        <option value="">Select a student</option>
                        {% for student in students %}
                            <option value="{{ student.id }}">{{ student.first_name }} {{ student.last_name }} ({{ student.username }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="id_course" class="form-label">Course</label>
                    <select name="course" id="id_course" class="form-control" required>
                        <option value="">Select a course</option>
                        {% for course in courses %}
                            <option value="{{ course.id }}">{{ course.code }} - {{ course.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Create Enrollment</button>
                    <a href="{% url 'admin_enrollments' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
