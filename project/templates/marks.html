<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        </style>
</head>
<body>
    <h1>Marks</h1>
    <table>
        <tr>
            <th>Course</th>
            <th>Marks</th>
        </tr>
        {% for mark in marks_data %}
        <tr>
            <td>{{ mark.course }}</td>
            <td>{{ mark.marks }}</td>
        </tr>
        {% endfor %}
    </table>
    
</body>
</html>
